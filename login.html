<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Kairos</title>
    <link rel="stylesheet" href="landing.css">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/favicon-180.png">
    <style>
        .login-page {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        .login-container {
            flex: 2; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background-color: #0f0f13;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
        }

        .login-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }
        .login-logo img { height: 32px; width: auto; }
        .login-logo span { font-size: 1.3rem; font-weight: bold; color: #a855f7; letter-spacing: 1px; }

        .login-box h2 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .login-box p { color: #aaa; margin-bottom: 30px; }

        .social-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #1e1e2f;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .social-btn:hover { background: #2a2a40; border-color: #a855f7; }
        
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #666;
            font-size: 0.9rem;
        }

        /* Email Form */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #ccc; font-size: 0.9rem; }
        .form-group input {
            width: 100%; padding: 12px; border-radius: 6px;
            background: #1e1e2f; border: 1px solid #333; color: #fff;
        }
        
        .login-btn {
            width: 100%; padding: 12px; border-radius: 6px;
            background: #a855f7; border: none; color: white;
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        /* Image */
        .image-container {
            flex: 3;
            background: url('image_0c9bc9.png') center/cover no-repeat;
            border-left: 1px solid #333;
        }

        @media (max-width: 768px) {
            .login-page { flex-direction: column; }
            .image-container { display: none; }
            .login-container { flex: 1; }
        }
    </style>
</head>
<body>
    <div class="login-page">

        <!-- Login form -->
        <div class="login-container">
            <div class="login-box">
                <div class="login-logo">
                    <img src="images/kairos-logo.png" alt="Kairos">
                    <span>Kairos</span>
                </div>

                <h2>Welcome back</h2>
                <p>Log in to access your intelligent schedule.</p>

                <button class="social-btn" id="btn-google">Continue with Google</button>
                <button class="social-btn" id="btn-github">Continue with GitHub</button>
                <button class="social-btn" id="btn-microsoft">Continue with Microsoft</button>

                <div class="divider">OR SECURELY WITH EMAIL</div>

                <form id="email-login-form">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" required placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>
                    <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="remember-me" style="width: auto;">
                        <label for="remember-me" style="margin: 0; cursor: pointer;">Remember me</label>
                    </div>
                    <button type="submit" class="login-btn">Sign In</button>
                </form>
            </div>
        </div>

        <div class="image-container"></div>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
